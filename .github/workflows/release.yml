name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: schema-risk-linux-x86_64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: schema-risk-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: schema-risk-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: schema-risk-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: schema-risk-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation tools (Linux musl)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_PROFILE_RELEASE_LTO: true
          CARGO_PROFILE_RELEASE_STRIP: true

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/schema-risk ${{ matrix.name }}
          chmod +x ${{ matrix.name }}

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/schema-risk.exe ${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          body: |
            ## Installation

            **Rust users:**
            ```bash
            cargo install schema-risk
            ```

            **Direct download (Linux x86_64):**
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/schema-risk-linux-x86_64 \
              -o /usr/local/bin/schema-risk && chmod +x /usr/local/bin/schema-risk
            ```

            See README for full installation options.
